ai_usage_summary: |
  Used Claude for architecture discussion, design decisions, debugging, and optimizations.

methodology_summary: |
  Multi-signal hybrid ranker combining TF-IDF semantic similarity (22%), hard skill
scoring (26%), nice-to-have skill matching (10%), career trajectory (18%), experience
fit (8%), location match (5%), education (3%), and engagement quality (8%). Availability
is applied as a multiplicative multiplier (0–1.2×) on the final score. Features include
pre-computed candidate text caches, startup founding-date honeypot detection, and
LangChain-only / consulting-heavy disqualifiers. Offline CPU sandbox compliant, no
network access during ranking.

